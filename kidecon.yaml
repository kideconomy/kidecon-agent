hermes_version: v1.2.0
hub_url: http://localhost:8000
provider: openrouter
tool_gate:
  allow:
  - file_read
  - file_append_markdown
  - hub_call
  - user_script_execute
  - message_user
  deny:
  - file_write_binary
  - shell_execute
  - file_delete
  require_approval:
  - user_script_first_run
  - hub_collaboration_request
update_channel: stable
